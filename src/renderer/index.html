<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Spotify Lyrics Overlay</title>
    <!-- Relaxed CSP to allow Google Fonts, Spotify API, and album art images -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://i.scdn.co https://*.scdn.co https://*.spotify.com; connect-src 'self' https://accounts.spotify.com https://api.spotify.com https://lrclib.net https://fonts.googleapis.com https://fonts.gstatic.com"
    />
    <!-- Preload fonts for faster rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      /* Transparent background for Electron overlay */
      html, body { background: transparent !important; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
